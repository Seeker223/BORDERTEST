<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
    .blur-container {
  position: relative;
  width: 500px; /* adjust the width and height to match your image */
  height: 300px;
}

.blur-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(255, 255, 255, 0.5);
  filter: blur(10px); /* apply Gaussian blur */
}

img {
  position: relative;
  z-index: -1; /* put the image behind the overlay */
}

  </style>
</head>

<body>

<div class="blur-container">
  <img src="image.jpg" alt="Image">
  <div class="blur-overlay"></div>
</div>


</body>

</html>

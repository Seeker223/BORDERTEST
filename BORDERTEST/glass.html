<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
</head>
<style>
body{
  background-color: black
}
  .glassmorphism {
  background: rgba(255, 255, 255, 0.2);
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  border-radius: 10px;
  padding: 20px;
  filter: blur(4px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.glassmorphism h1 {
  font-size: 24px;
  font-weight: bold;
  color: #333;
}

.glassmorphism p {
  font-size: 18px;
  color: #666;
}

.glassmorphism button {
  background: linear-gradient(to bottom, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0));
  border: 2px solid white;
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
}

.non-glassmorphic {
  background: #333;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 18px;
  cursor: pointer;
}

</style>
<body>
<div class="glassmorphism">
  <h1>Glassmorphism Effect</h1>
  <p>This is a example of glassmorphism design trend.</p>
  <button>Click me</button>
</div>


</body>

</html>

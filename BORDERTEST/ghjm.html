
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      height: 100vh;
    }

    .container {
      overflow-y: scroll;
      height: 100%;
      width: 50vw;
      position: relative;
      border-radius: 20px 0 0 20px;
      transform: perspective(800px) rotateY(-30deg);
      transform-origin: 100% 50%;
    }

    .image-wrapper {
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .rounded-image {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="image-wrapper">
      <!-- Repeat this block for each image -->
      <img src="/BORDERTEST/image/post-pics/1706909281688.jpg" alt="rounded-image" class="rounded-image">
            <img src="/BORDERTEST/image/post-pics/1706909281688.jpg" alt="rounded-image" class="rounded-image">
                  <img src="/BORDERTEST/image/post-pics/1706909281688.jpg" alt="rounded-image" class="rounded-image">
                        <img src="/BORDERTEST/image/post-pics/1706909281688.jpg" alt="rounded-image" class="rounded-image">
                              <img src="/BORDERTEST/image/post-pics/1706909281688.jpg" alt="rounded-image" class="rounded-image">
      <!-- End of repeated block -->
    </div>
  </div>
</body>
</html>
